name: Windows release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows-x64:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: "x64"
          cache: "pip"

      - name: Install build dependencies
        run: python -m pip install -r requirements-build.txt

      - name: Build release bundle
        shell: powershell
        run: tools/build_windows_release.ps1

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ancient-empires-windows-x64
          path: dist/ancient-empires-*-windows-x64.zip

      - name: Attach bundle to GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "${{ github.ref_name }}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --generate-notes
          }
          gh release upload "${{ github.ref_name }}" dist/ancient-empires-*-windows-x64.zip --clobber
